name: Deploy Web (GitHub Pages)

# main'e her push'ta web'i derleyip `gh-pages` dalına yayınlar.
# Bu yöntem yalnızca `contents: write` gerektirir (Pages API izni gerekmez),
# bu yüzden otomatik GITHUB_TOKEN ile güvenilir çalışır.
#
# Tek seferlik: Settings → Pages → Source "Deploy from a branch" →
#   Branch: gh-pages · Folder: / (root). Sonrası otomatik.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter sürümünü oku
        id: fv
        run: echo "version=$(tr -d '[:space:]' < scripts/flutter-version.txt)" >> "$GITHUB_OUTPUT"

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fv.outputs.version }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Yerel CanvasKit (çevrimdışı) + proje deposu için base-href "/<repo>/".
      - name: Web derlemesi
        run: |
          flutter build web --release --no-web-resources-cdn \
            --base-href "/${GITHUB_REPOSITORY#*/}/"
          touch build/web/.nojekyll

      - name: gh-pages dalına yayınla
        run: |
          cd build/web
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -qm "Deploy ${GITHUB_SHA::7}"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
